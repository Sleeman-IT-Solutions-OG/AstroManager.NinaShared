name: Publish Packages

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: windows-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Configure GitHub Packages source
        shell: pwsh
        run: |
          dotnet nuget remove source github 2>$null
          dotnet nuget add source --username "${{ github.actor }}" --password "${{ secrets.GITHUB_TOKEN }}" --store-password-in-clear-text --name github "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"

      - name: Restore Contracts
        run: dotnet restore .\AstroManager.Contracts\AstroManager.Contracts.csproj

      - name: Restore PluginShared
        run: dotnet restore .\AstroManager.PluginShared\AstroManager.PluginShared.csproj

      - name: Pack Contracts
        run: dotnet pack .\AstroManager.Contracts\AstroManager.Contracts.csproj -c Release --no-restore

      - name: Pack PluginShared
        run: dotnet pack .\AstroManager.PluginShared\AstroManager.PluginShared.csproj -c Release --no-restore

      - name: Push Contracts package
        run: dotnet nuget push .\AstroManager.Contracts\bin\Release\*.nupkg --source github --skip-duplicate

      - name: Push PluginShared package
        run: dotnet nuget push .\AstroManager.PluginShared\bin\Release\*.nupkg --source github --skip-duplicate
